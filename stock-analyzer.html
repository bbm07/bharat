<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Stock Fundamental Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #080c18;
  color: #e2e8f0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  border-bottom: 1px solid #1e2a4a;
  padding: 24px 20px 20px;
  text-align: center;
}
.header h1 {
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.header p { color: #64748b; font-size: 13px; }
.search-section {
  max-width: 640px;
  margin: 32px auto 0;
  padding: 0 20px;
}
.search-box {
  display: flex;
  gap: 10px;
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 6px 6px 6px 16px;
  align-items: center;
}
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #e2e8f0;
  font-size: 15px;
  padding: 8px 0;
}
.search-box input::placeholder { color: #475569; }
.search-btn {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border: none;
  border-radius: 8px;
  color: white;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.search-btn:hover { opacity: 0.85; }
.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.hint { color: #475569; font-size: 12px; margin-top: 8px; text-align: center; }
.hint span { color: #60a5fa; }
.container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
.loader {
  display: none;
  text-align: center;
  padding: 60px 20px;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid #1e3a5f;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { color: #64748b; font-size: 14px; }
.error-box {
  display: none;
  background: #1a0a0a;
  border: 1px solid #7f1d1d;
  border-radius: 10px;
  padding: 20px;
  margin-top: 24px;
  color: #fca5a5;
  text-align: center;
}
.results { display: none; }

/* Stock Header */
.stock-header {
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  border: 1px solid #1e3a5f;
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
}
.stock-name { font-size: 22px; font-weight: 700; color: #f1f5f9; }
.stock-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.stock-price { text-align: right; }
.price-val { font-size: 28px; font-weight: 700; color: #34d399; }
.price-change { font-size: 13px; margin-top: 2px; }
.price-change.up { color: #34d399; }
.price-change.down { color: #f87171; }
.stock-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #1e3a5f;
  width: 100%;
}
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.meta-val { font-size: 14px; font-weight: 600; color: #cbd5e1; }

/* Score Card */
.score-section {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  margin-bottom: 20px;
  align-items: center;
}
.score-card {
  background: #0f172a;
  border: 2px solid #1e3a5f;
  border-radius: 14px;
  padding: 24px 32px;
  text-align: center;
  min-width: 160px;
}
.score-num {
  font-size: 64px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.score-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
.score-elite { color: #34d399; border-color: #065f46; }
.score-high { color: #60a5fa; border-color: #1e3a5f; }
.score-watch { color: #fbbf24; border-color: #78350f; }
.score-reject { color: #f87171; border-color: #7f1d1d; }
.category-card {
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 14px;
  padding: 20px 24px;
}
.category-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.badge-compounder { background: #064e3b; color: #34d399; }
.badge-growth { background: #1e1b4b; color: #a78bfa; }
.badge-value { background: #78350f; color: #fbbf24; }
.badge-cyclical { background: #0c4a6e; color: #38bdf8; }
.badge-turnaround { background: #4c1d95; color: #c4b5fd; }
.verdict { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.verdict-desc { font-size: 13px; color: #64748b; line-height: 1.5; }

/* Phase Cards */
.phases-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
@media (max-width: 600px) { .phases-grid { grid-template-columns: 1fr; } .score-section { grid-template-columns: 1fr; } }
.phase-card {
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  overflow: hidden;
}
.phase-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.phase-header:hover { background: #1e2a4a; }
.phase-icon { font-size: 18px; }
.phase-title { flex: 1; font-size: 13px; font-weight: 600; }
.phase-status {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-pass { background: #064e3b; color: #34d399; }
.status-warn { background: #78350f; color: #fbbf24; }
.status-fail { background: #7f1d1d; color: #f87171; }
.status-na { background: #1e293b; color: #64748b; }
.phase-chevron { color: #475569; transition: transform 0.2s; font-size: 12px; }
.phase-card.open .phase-chevron { transform: rotate(180deg); }
.phase-body {
  display: none;
  padding: 0 16px 14px;
  border-top: 1px solid #1e2a4a;
}
.phase-card.open .phase-body { display: block; }
.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid #0f172a;
  font-size: 12px;
  gap: 8px;
}
.metric-row:last-child { border-bottom: none; }
.metric-name { color: #94a3b8; flex: 1; }
.metric-val { font-weight: 600; color: #e2e8f0; min-width: 80px; text-align: right; }
.metric-status { font-size: 10px; padding: 2px 7px; border-radius: 8px; min-width: 40px; text-align: center; }
.ms-pass { background: #064e3b; color: #34d399; }
.ms-warn { background: #78350f; color: #fbbf24; }
.ms-fail { background: #7f1d1d; color: #f87171; }
.ms-na { background: #1e293b; color: #64748b; }

/* Output Table */
.output-section {
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
}
.output-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #93c5fd; }
.output-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 500px) { .output-grid { grid-template-columns: 1fr; } }
.out-item { background: #080c18; border-radius: 8px; padding: 10px 14px; }
.out-label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.out-val { font-size: 14px; font-weight: 600; color: #cbd5e1; }
.out-val.green { color: #34d399; }
.out-val.red { color: #f87171; }
.out-val.yellow { color: #fbbf24; }
.out-val.blue { color: #60a5fa; }

.strengths-risks {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
@media (max-width: 600px) { .strengths-risks { grid-template-columns: 1fr; } }
.sr-card {
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 18px;
}
.sr-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.sr-card.strengths h3 { color: #34d399; }
.sr-card.risks h3 { color: #f87171; }
.sr-list { list-style: none; }
.sr-list li {
  font-size: 13px;
  color: #94a3b8;
  padding: 5px 0;
  border-bottom: 1px solid #1e2a4a;
  display: flex;
  gap: 8px;
}
.sr-list li:last-child { border-bottom: none; }
.sr-list li::before { flex-shrink: 0; }
.sr-card.strengths .sr-list li::before { content: '\2713'; color: #34d399; }
.sr-card.risks .sr-list li::before { content: '\26a0'; color: #f87171; }

.disclaimer {
  background: #0a0e1a;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 14px;
  font-size: 11px;
  color: #475569;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="header">
  <h1>Indian Stock Fundamental Analyzer</h1>
  <p>Institutional-grade equity research · NSE/BSE · 12-Phase Analysis</p>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="text" id="stockInput" placeholder="Enter NSE symbol or company name (e.g. RELIANCE, Infosys, TCS)" autocomplete="off" />
    <button class="search-btn" id="analyzeBtn" onclick="startAnalysis()">Analyze</button>
  </div>
  <p class="hint">Examples: <span>RELIANCE</span> · <span>HDFCBANK</span> · <span>INFY</span> · <span>BAJFINANCE</span> · <span>HUDCO</span></p>
</div>

<div class="container">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p id="loaderMsg">Fetching financial data...</p>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="results" id="results"></div>
</div>

<script>
const PROXY = 'https://corsproxy.io/?url=';

async function fetchJSON(url) {
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (r.ok) return r.json();
  } catch {}
  try {
    const r = await fetch(PROXY + encodeURIComponent(url));
    if (r.ok) return r.json();
  } catch {}
  throw new Error('Network request failed for: ' + url);
}

function setLoader(msg) {
  document.getElementById('loader').style.display = 'block';
  document.getElementById('loaderMsg').textContent = msg;
  document.getElementById('results').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
}
function hideLoader() { document.getElementById('loader').style.display = 'none'; }
function showError(msg) {
  hideLoader();
  const box = document.getElementById('errorBox');
  box.style.display = 'block';
  box.innerHTML = '<b>Error:</b> ' + msg + '<br><small style="color:#475569;margin-top:8px;display:block">Try the exact NSE symbol (e.g. RELIANCE, HDFCBANK, TCS)</small>';
}

document.getElementById('stockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnalysis();
});

async function startAnalysis() {
  const raw = document.getElementById('stockInput').value.trim().toUpperCase();
  if (!raw) return;
  document.getElementById('analyzeBtn').disabled = true;
  setLoader('Searching for ' + raw + '...');

  try {
    let symbol = await resolveSymbol(raw);
    setLoader('Fetching financial data for ' + symbol + '...');
    const data = await fetchStockData(symbol);
    setLoader('Running 12-phase analysis...');
    const analysis = analyzeStock(data, symbol);
    hideLoader();
    renderResults(analysis);
  } catch (e) {
    showError(e.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

async function resolveSymbol(input) {
  if (input.endsWith('.NS') || input.endsWith('.BO')) return input;
  const direct = input + '.NS';
  try {
    const test = await fetchJSON('https://query1.finance.yahoo.com/v10/finance/quoteSummary/' + direct + '?modules=summaryDetail');
    if (test.quoteSummary && test.quoteSummary.result) return direct;
  } catch {}
  const searchUrl = new URL('https://query1.finance.yahoo.com/v1/finance/search');
  searchUrl.searchParams.set('q', input);
  searchUrl.searchParams.set('quotesCount', '10');
  searchUrl.searchParams.set('newsCount', '0');
  const res = await fetchJSON(searchUrl.toString());
  const quotes = res.quotes || [];
  const indian = quotes.find(q => (q.symbol||'').endsWith('.NS') || (q.symbol||'').endsWith('.BO'));
  if (indian) return indian.symbol;
  const any = quotes.find(q => q.quoteType === 'EQUITY');
  if (any) return any.symbol;
  throw new Error('Could not find stock: ' + input + '. Try the exact NSE symbol.');
}

async function fetchStockData(symbol) {
  const modules = [
    'summaryDetail', 'defaultKeyStatistics', 'financialData',
    'incomeStatementHistory', 'cashflowStatementHistory', 'balanceSheetHistory',
    'incomeStatementHistoryQuarterly', 'majorHoldersBreakdown', 'price',
    'assetProfile', 'calendarEvents'
  ].join(',');
  const url = 'https://query1.finance.yahoo.com/v10/finance/quoteSummary/' + symbol + '?modules=' + modules;
  const res = await fetchJSON(url);
  if (!res.quoteSummary || !res.quoteSummary.result || !res.quoteSummary.result[0]) {
    throw new Error('No data found for symbol: ' + symbol);
  }
  return { symbol, ...res.quoteSummary.result[0] };
}

function v(obj, ...path) {
  let cur = obj;
  for (const k of path) {
    if (cur == null) return null;
    cur = cur[k];
  }
  if (cur && typeof cur === 'object' && 'raw' in cur) return cur.raw;
  return cur ?? null;
}
function fmt(n, d = 1) {
  if (n == null) return 'N/A';
  const cr = n / 1e7;
  if (Math.abs(cr) >= 100000) return '₹' + (cr / 100000).toFixed(d) + 'L Cr';
  if (Math.abs(cr) >= 1) return '₹' + cr.toFixed(d) + ' Cr';
  return '₹' + n.toFixed(0);
}
function pct(n) { return n == null ? 'N/A' : (n * 100).toFixed(1) + '%'; }
function mcapCr(n) {
  if (n == null) return 'N/A';
  const cr = n / 1e7;
  if (cr >= 100000) return '₹' + (cr / 100000).toFixed(2) + 'L Cr';
  if (cr >= 10000) return '₹' + (cr / 10000).toFixed(2) + 'L Cr';
  return '₹' + cr.toFixed(0) + ' Cr';
}
function cagrPct(start, end, years) {
  if (!start || !end || start <= 0 || end <= 0 || years <= 0) return null;
  return (Math.pow(end / start, 1 / years) - 1) * 100;
}

function analyzeStock(data, symbol) {
  const sd = data.summaryDetail || {};
  const ks = data.defaultKeyStatistics || {};
  const fd = data.financialData || {};
  const price = data.price || {};
  const profile = data.assetProfile || {};
  const mh = data.majorHoldersBreakdown || {};

  const incAnnual = (data.incomeStatementHistory?.incomeStatementHistory || []);
  const cfAnnual = (data.cashflowStatementHistory?.cashflowStatementHistory || []);
  const bsAnnual = (data.balanceSheetHistory?.balanceSheetHistory || []);
  const incQtr = (data.incomeStatementHistoryQuarterly?.incomeStatementHistory || []);

  const marketCap = v(sd, 'marketCap') || v(price, 'marketCap');
  const marketCapCr = marketCap ? marketCap / 1e7 : null;
  const currentPrice = v(fd, 'currentPrice') || v(price, 'regularMarketPrice');
  const prevClose = v(sd, 'previousClose') || v(price, 'regularMarketPreviousClose');
  const priceChange = currentPrice && prevClose ? ((currentPrice - prevClose) / prevClose * 100) : null;
  const pe = v(sd, 'trailingPE') || v(ks, 'trailingPE');
  const forwardPE = v(ks, 'forwardPE') || v(sd, 'forwardPE');
  const peg = v(ks, 'pegRatio');
  const pb = v(ks, 'priceToBook');
  const evEbitda = v(ks, 'enterpriseToEbitda');
  const evRev = v(ks, 'enterpriseToRevenue');
  const eps = v(ks, 'trailingEps');
  const roe = v(fd, 'returnOnEquity');
  const roa = v(fd, 'returnOnAssets');
  const de = v(fd, 'debtToEquity');
  const deRatio = de != null ? de / 100 : null;
  const currentRatio = v(fd, 'currentRatio');
  const totalDebt = v(fd, 'totalDebt');
  const totalCash = v(fd, 'totalCash');
  const netDebt = totalDebt != null && totalCash != null ? totalDebt - totalCash : null;
  const ocf = v(fd, 'operatingCashflow');
  const fcf = v(fd, 'freeCashflow');
  const revenue = v(fd, 'totalRevenue');
  const grossMargin = v(fd, 'grossMargins');
  const opMargin = v(fd, 'operatingMargins');
  const ebitdaMargin = v(fd, 'ebitdaMargins');
  const profitMargin = v(fd, 'profitMargins');
  const earningsGrowth = v(fd, 'earningsGrowth');
  const promoterHolding = v(mh, 'insidersPercentHeld');
  const institutionalHolding = v(mh, 'institutionsPercentHeld');
  const sector = profile.sector || v(price, 'sector') || 'N/A';
  const industry = profile.industry || 'N/A';
  const companyName = v(price, 'longName') || v(price, 'shortName') || symbol.replace('.NS', '').replace('.BO', '');
  const exchange = symbol.endsWith('.NS') ? 'NSE' : symbol.endsWith('.BO') ? 'BSE' : '';

  const revSeries = incAnnual.map(s => v(s, 'totalRevenue')).filter(x => x != null);
  const patSeries = incAnnual.map(s => v(s, 'netIncome')).filter(x => x != null);
  const ebitSeries = incAnnual.map(s => v(s, 'ebit')).filter(x => x != null);
  const cfSeries = cfAnnual.map(s => v(s, 'totalCashFromOperatingActivities')).filter(x => x != null);
  const fcfSeries = cfAnnual.map(s => {
    const cfo = v(s, 'totalCashFromOperatingActivities');
    const capex = v(s, 'capitalExpenditures');
    if (cfo != null && capex != null) return cfo - Math.abs(capex);
    return v(s, 'freeCashFlow');
  }).filter(x => x != null);

  const rev3yCagr = revSeries.length >= 4 ? cagrPct(revSeries[3], revSeries[0], 3) : null;
  const pat3yCagr = patSeries.length >= 4 ? cagrPct(patSeries[3], patSeries[0], 3) : null;
  const rev5yCagr = revSeries.length >= 4 ? cagrPct(revSeries[Math.min(3, revSeries.length-1)], revSeries[0], Math.min(3, revSeries.length-1)) : null;
  const pat5yCagr = patSeries.length >= 4 ? cagrPct(patSeries[Math.min(3, patSeries.length-1)], patSeries[0], Math.min(3, patSeries.length-1)) : null;

  const qRev0 = incQtr.length > 0 ? v(incQtr[0], 'totalRevenue') : null;
  const qRev4 = incQtr.length > 4 ? v(incQtr[4], 'totalRevenue') : null;
  const qPat0 = incQtr.length > 0 ? v(incQtr[0], 'netIncome') : null;
  const qPat4 = incQtr.length > 4 ? v(incQtr[4], 'netIncome') : null;
  const qRevGrowth = qRev0 && qRev4 && qRev4 > 0 ? (qRev0 - qRev4) / qRev4 * 100 : null;
  const qPatGrowth = qPat0 && qPat4 && qPat4 > 0 ? (qPat0 - qPat4) / qPat4 * 100 : null;

  let revDeclines = 0;
  for (let i = 0; i < revSeries.length - 1; i++) {
    if (revSeries[i] < revSeries[i+1]) revDeclines++;
  }

  const totalAssets = bsAnnual.length > 0 ? v(bsAnnual[0], 'totalAssets') : null;
  const currLiab = bsAnnual.length > 0 ? v(bsAnnual[0], 'totalCurrentLiabilities') : null;
  const capEmployed = totalAssets && currLiab ? totalAssets - currLiab : null;
  const ebit = ebitSeries.length > 0 ? ebitSeries[0] : null;
  const roce = ebit && capEmployed && capEmployed > 0 ? (ebit / capEmployed * 100) : null;

  const cfoPat = ocf && patSeries.length > 0 && patSeries[0] > 0 ? ocf / patSeries[0] : null;
  const interestExp = bsAnnual.length > 0 ? v(bsAnnual[0], 'interestExpense') : null;
  let icr = null;
  if (ebit && interestExp && Math.abs(interestExp) > 0) icr = Math.abs(ebit / interestExp);

  const fcfPositiveYears = fcfSeries.filter(x => x > 0).length;
  const patGtRev = pat3yCagr != null && rev3yCagr != null ? pat3yCagr >= rev3yCagr : null;
  const isNetCash = netDebt != null ? netDebt < 0 : null;

  let scoreBreakdown = {};

  let gScore = 0;
  if (rev3yCagr != null) gScore += rev3yCagr > 20 ? 6 : rev3yCagr > 15 ? 4 : rev3yCagr > 10 ? 2 : 0;
  if (pat3yCagr != null) gScore += pat3yCagr > 25 ? 7 : pat3yCagr > 20 ? 5 : pat3yCagr > 15 ? 3 : pat3yCagr > 10 ? 1 : 0;
  if (qRevGrowth != null) gScore += qRevGrowth > 20 ? 3 : qRevGrowth > 15 ? 2 : qRevGrowth > 10 ? 1 : 0;
  if (qPatGrowth != null) gScore += qPatGrowth > 25 ? 4 : qPatGrowth > 20 ? 3 : qPatGrowth > 15 ? 2 : qPatGrowth > 10 ? 1 : 0;
  if (patGtRev === true) gScore += 3;
  if (revDeclines === 0) gScore += 2; else if (revDeclines === 1) gScore += 1;
  scoreBreakdown.growth = Math.min(25, gScore);

  let bScore = 0;
  if (deRatio != null) bScore += deRatio < 0.1 ? 6 : deRatio < 0.3 ? 4 : deRatio < 0.5 ? 2 : deRatio < 0.8 ? 1 : 0;
  if (isNetCash === true) bScore += 4;
  if (icr != null) bScore += icr > 15 ? 4 : icr > 10 ? 3 : icr > 6 ? 2 : icr > 3 ? 1 : 0;
  if (currentRatio != null) bScore += currentRatio > 2.5 ? 4 : currentRatio > 1.5 ? 3 : currentRatio > 1 ? 1 : 0;
  if (deRatio != null && deRatio < 0.3) bScore += 2;
  scoreBreakdown.balanceSheet = Math.min(20, bScore);

  let cfScore = 0;
  if (cfSeries.length > 0) {
    const allPos = cfSeries.every(x => x > 0);
    cfScore += allPos ? 5 : cfSeries.filter(x => x > 0).length >= 2 ? 2 : 0;
  }
  if (cfoPat != null) cfScore += cfoPat > 1.2 ? 6 : cfoPat > 0.9 ? 4 : cfoPat > 0.7 ? 2 : cfoPat > 0 ? 1 : 0;
  if (fcfSeries.length > 0) cfScore += fcfPositiveYears >= 4 ? 5 : fcfPositiveYears >= 3 ? 3 : fcfPositiveYears >= 2 ? 1 : 0;
  if (fcf != null && fcf > 0) cfScore += 4;
  scoreBreakdown.cashFlow = Math.min(20, cfScore);

  let ceScore = 0;
  if (roce != null) ceScore += roce > 30 ? 10 : roce > 25 ? 8 : roce > 18 ? 6 : roce > 12 ? 3 : 0;
  if (roe != null) { const r = roe*100; ceScore += r > 25 ? 6 : r > 20 ? 4 : r > 15 ? 3 : r > 10 ? 1 : 0; }
  if (roa != null) { const r = roa*100; ceScore += r > 15 ? 4 : r > 10 ? 3 : r > 5 ? 2 : 0; }
  scoreBreakdown.capEfficiency = Math.min(20, ceScore);

  let govScore = 0;
  if (promoterHolding != null) { const ph = promoterHolding*100; govScore += ph > 60 ? 5 : ph > 50 ? 4 : ph > 35 ? 2 : 1; } else { govScore += 2; }
  if (institutionalHolding != null) { const ih = institutionalHolding*100; govScore += ih > 40 ? 5 : ih > 25 ? 4 : ih > 15 ? 3 : ih > 5 ? 2 : 1; } else { govScore += 2; }
  scoreBreakdown.governance = Math.min(10, govScore);

  let valScore = 0;
  if (peg != null) valScore += peg < 1 ? 3 : peg < 1.5 ? 2 : peg < 2 ? 1 : 0;
  if (evEbitda != null) valScore += evEbitda < 20 ? 2 : evEbitda < 30 ? 1 : 0;
  if (profitMargin != null && profitMargin > 0.15) valScore += 1;
  scoreBreakdown.valuation = Math.min(5, valScore);

  const totalScore = Object.values(scoreBreakdown).reduce((a, b) => a + b, 0);

  let category = 'GROWTH STOCK', categoryClass = 'badge-growth';
  if (deRatio != null && deRatio < 0.3 && roce != null && roce > 20 && rev3yCagr != null && rev3yCagr > 15 && totalScore >= 70) {
    category = 'ELITE COMPOUNDER'; categoryClass = 'badge-compounder';
  } else if (pe != null && pe < 15 && totalScore < 65 && pat3yCagr != null && pat3yCagr > 15) {
    category = 'VALUE PICK'; categoryClass = 'badge-value';
  } else if (ebitdaMargin != null && ebitdaMargin > 0 && ebitdaMargin < 0.08) {
    category = 'CYCLICAL'; categoryClass = 'badge-cyclical';
  } else if (pat3yCagr != null && pat3yCagr > 30 && rev3yCagr != null && rev3yCagr < 10) {
    category = 'TURNAROUND'; categoryClass = 'badge-turnaround';
  }

  let verdict, verdictDesc;
  if (totalScore >= 85) { verdict = 'Elite Compounder'; verdictDesc = 'Exceptional fundamentals. Institutional-grade business with strong moat, clean accounting, and superior capital efficiency.'; }
  else if (totalScore >= 70) { verdict = 'Fundamentally Strong'; verdictDesc = 'High quality business with strong growth, clean balance sheet, and good capital efficiency. Suitable for long-term portfolio.'; }
  else if (totalScore >= 60) { verdict = 'Watchlist Candidate'; verdictDesc = 'Decent fundamentals but some parameters need monitoring. Keep on watchlist and review next quarter.'; }
  else { verdict = 'Does Not Qualify'; verdictDesc = 'Below quality threshold. Significant weaknesses in fundamentals. Not suitable for quality-focused portfolio.'; }

  const strengths = [], risks = [];
  if (rev3yCagr != null && rev3yCagr > 15) strengths.push('Revenue 3Y CAGR: ' + rev3yCagr.toFixed(1) + '% — strong top-line growth');
  if (pat3yCagr != null && pat3yCagr > 20) strengths.push('PAT 3Y CAGR: ' + pat3yCagr.toFixed(1) + '% — accelerating bottom-line');
  if (deRatio != null && deRatio < 0.3) strengths.push('Debt/Equity: ' + deRatio.toFixed(2) + ' — nearly debt-free balance sheet');
  if (isNetCash === true) strengths.push('Net Cash company — cash exceeds total debt');
  if (roce != null && roce > 20) strengths.push('ROCE: ' + roce.toFixed(1) + '% — superior capital efficiency');
  if (roe != null && roe * 100 > 18) strengths.push('ROE: ' + pct(roe) + ' — strong return for shareholders');
  if (cfoPat != null && cfoPat > 0.9) strengths.push('CFO/PAT: ' + cfoPat.toFixed(2) + ' — high earnings quality');
  if (profitMargin != null && profitMargin > 0.15) strengths.push('PAT Margin: ' + pct(profitMargin) + ' — premium profitability');
  if (promoterHolding != null && promoterHolding > 0.5) strengths.push('Promoter Holding: ' + pct(promoterHolding) + ' — strong insider conviction');

  if (rev3yCagr == null || rev3yCagr < 10) risks.push('Weak or unavailable revenue growth data');
  if (deRatio != null && deRatio > 0.8) risks.push('High leverage (D/E: ' + deRatio.toFixed(2) + ') — financial risk');
  if (currentRatio != null && currentRatio < 1.2) risks.push('Low current ratio (' + currentRatio.toFixed(2) + ') — liquidity concern');
  if (fcf != null && fcf < 0) risks.push('Negative free cash flow — capital intensive or cash burn');
  if (cfoPat != null && cfoPat < 0.7) risks.push('CFO below PAT — possible earnings quality concern');
  if (peg != null && peg > 2) risks.push('High PEG ratio (' + peg.toFixed(2) + ') — expensive relative to growth');
  if (pe != null && pe > 60) risks.push('Elevated PE (' + pe.toFixed(0) + 'x) — valuation risk');
  if (promoterHolding != null && promoterHolding < 0.35) risks.push('Low promoter holding — limited insider conviction');
  if (revDeclines >= 2) risks.push('Multiple revenue declines in recent years');
  if (patSeries.some(x => x < 0)) risks.push('Loss-making years in history — PAT volatility');
  if (strengths.length === 0) strengths.push('Insufficient data to identify clear strengths');
  if (risks.length === 0) risks.push('No major red flags identified from available data');

  const phases = [
    { icon: '📋', title: 'Phase 1 — Basic Eligibility', status: marketCapCr && marketCapCr > 1000 ? 'pass' : 'warn',
      metrics: [
        { name: 'Market Cap', val: mcapCr(marketCap), status: marketCapCr ? (marketCapCr > 5000 ? 'pass' : marketCapCr > 1000 ? 'warn' : 'fail') : 'na', threshold: '> ₹1,000 Cr' },
        { name: 'Exchange', val: exchange || 'N/A', status: exchange ? 'pass' : 'na', threshold: 'NSE/BSE' },
        { name: 'Sector', val: sector, status: 'na', threshold: '' },
        { name: 'Industry', val: industry, status: 'na', threshold: '' },
      ]
    },
    { icon: '📈', title: 'Phase 2 — Revenue Growth', status: rev3yCagr != null && rev3yCagr > 15 ? 'pass' : rev3yCagr != null && rev3yCagr > 10 ? 'warn' : 'fail',
      metrics: [
        { name: '3Y Revenue CAGR', val: rev3yCagr != null ? rev3yCagr.toFixed(1) + '%' : 'N/A', status: rev3yCagr != null ? (rev3yCagr > 15 ? 'pass' : rev3yCagr > 10 ? 'warn' : 'fail') : 'na', threshold: '> 15%' },
        { name: '5Y Revenue CAGR', val: rev5yCagr != null ? rev5yCagr.toFixed(1) + '%' : 'N/A', status: rev5yCagr != null ? (rev5yCagr > 12 ? 'pass' : rev5yCagr > 8 ? 'warn' : 'fail') : 'na', threshold: '> 12%' },
        { name: 'Quarterly YoY Sales Growth', val: qRevGrowth != null ? qRevGrowth.toFixed(1) + '%' : 'N/A', status: qRevGrowth != null ? (qRevGrowth > 15 ? 'pass' : qRevGrowth > 8 ? 'warn' : 'fail') : 'na', threshold: '> 15%' },
        { name: 'Revenue Declines (last 3Y)', val: revDeclines.toString(), status: revDeclines === 0 ? 'pass' : revDeclines === 1 ? 'warn' : 'fail', threshold: '≤ 1' },
        { name: 'TTM Revenue', val: fmt(revenue), status: 'na', threshold: '' },
      ]
    },
    { icon: '💰', title: 'Phase 3 — Bottom Line (PAT)', status: pat3yCagr != null && pat3yCagr > 20 ? 'pass' : pat3yCagr != null && pat3yCagr > 12 ? 'warn' : 'fail',
      metrics: [
        { name: '3Y PAT CAGR', val: pat3yCagr != null ? pat3yCagr.toFixed(1) + '%' : 'N/A', status: pat3yCagr != null ? (pat3yCagr > 20 ? 'pass' : pat3yCagr > 12 ? 'warn' : 'fail') : 'na', threshold: '> 20%' },
        { name: '5Y PAT CAGR', val: pat5yCagr != null ? pat5yCagr.toFixed(1) + '%' : 'N/A', status: pat5yCagr != null ? (pat5yCagr > 15 ? 'pass' : pat5yCagr > 10 ? 'warn' : 'fail') : 'na', threshold: '> 15%' },
        { name: 'Quarterly PAT Growth YoY', val: qPatGrowth != null ? qPatGrowth.toFixed(1) + '%' : 'N/A', status: qPatGrowth != null ? (qPatGrowth > 20 ? 'pass' : qPatGrowth > 10 ? 'warn' : 'fail') : 'na', threshold: '> 20%' },
        { name: 'PAT Growth ≥ Revenue Growth', val: patGtRev != null ? (patGtRev ? 'Yes' : 'No') : 'N/A', status: patGtRev === true ? 'pass' : patGtRev === false ? 'warn' : 'na', threshold: 'Required' },
        { name: 'PAT Margin', val: profitMargin != null ? pct(profitMargin) : 'N/A', status: profitMargin != null ? (profitMargin > 0.15 ? 'pass' : profitMargin > 0.10 ? 'warn' : 'fail') : 'na', threshold: '> 10%' },
      ]
    },
    { icon: '📊', title: 'Phase 4 — Margin Quality', status: ebitdaMargin != null && ebitdaMargin > 0.15 && profitMargin != null && profitMargin > 0.10 ? 'pass' : 'warn',
      metrics: [
        { name: 'EBITDA Margin', val: ebitdaMargin != null ? pct(ebitdaMargin) : 'N/A', status: ebitdaMargin != null ? (ebitdaMargin > 0.20 ? 'pass' : ebitdaMargin > 0.12 ? 'warn' : 'fail') : 'na', threshold: 'Stable/Improving' },
        { name: 'Operating Margin', val: opMargin != null ? pct(opMargin) : 'N/A', status: opMargin != null ? (opMargin > 0.15 ? 'pass' : opMargin > 0.08 ? 'warn' : 'fail') : 'na', threshold: '> 10%' },
        { name: 'PAT Margin', val: profitMargin != null ? pct(profitMargin) : 'N/A', status: profitMargin != null ? (profitMargin > 0.15 ? 'pass' : profitMargin > 0.10 ? 'warn' : 'fail') : 'na', threshold: '> 10%' },
        { name: 'Gross Margin', val: grossMargin != null ? pct(grossMargin) : 'N/A', status: grossMargin != null ? (grossMargin > 0.40 ? 'pass' : grossMargin > 0.20 ? 'warn' : 'fail') : 'na', threshold: '' },
        { name: 'Revenue Trend (Annual)', val: revSeries.slice(0,4).map(x => fmt(x)).join(' → '), status: 'na', threshold: '' },
      ]
    },
    { icon: '🏦', title: 'Phase 5 — Balance Sheet', status: deRatio != null && deRatio < 0.5 && currentRatio != null && currentRatio > 1.5 ? 'pass' : deRatio != null && deRatio < 0.8 ? 'warn' : 'fail',
      metrics: [
        { name: 'Debt / Equity', val: deRatio != null ? deRatio.toFixed(2) + 'x' : 'N/A', status: deRatio != null ? (deRatio < 0.3 ? 'pass' : deRatio < 0.8 ? 'warn' : 'fail') : 'na', threshold: '< 0.3 preferred' },
        { name: 'Net Debt', val: netDebt != null ? (netDebt < 0 ? '✓ Net Cash ' + fmt(Math.abs(netDebt)) : fmt(netDebt)) : 'N/A', status: netDebt != null ? (netDebt < 0 ? 'pass' : 'warn') : 'na', threshold: 'Net Cash preferred' },
        { name: 'Interest Coverage Ratio', val: icr != null ? icr.toFixed(1) + 'x' : 'N/A', status: icr != null ? (icr > 10 ? 'pass' : icr > 6 ? 'warn' : 'fail') : 'na', threshold: '> 6x mandatory' },
        { name: 'Current Ratio', val: currentRatio != null ? currentRatio.toFixed(2) : 'N/A', status: currentRatio != null ? (currentRatio > 2 ? 'pass' : currentRatio > 1.5 ? 'warn' : 'fail') : 'na', threshold: '> 1.5 preferred' },
        { name: 'Total Debt', val: fmt(totalDebt), status: 'na', threshold: '' },
        { name: 'Total Cash', val: fmt(totalCash), status: 'na', threshold: '' },
      ]
    },
    { icon: '💵', title: 'Phase 6 — Cash Flow Quality', status: ocf != null && ocf > 0 && cfoPat != null && cfoPat > 0.9 ? 'pass' : ocf != null && ocf > 0 ? 'warn' : 'fail',
      metrics: [
        { name: 'Operating Cash Flow (TTM)', val: fmt(ocf), status: ocf != null ? (ocf > 0 ? 'pass' : 'fail') : 'na', threshold: '> 0' },
        { name: 'Free Cash Flow (TTM)', val: fmt(fcf), status: fcf != null ? (fcf > 0 ? 'pass' : 'warn') : 'na', threshold: 'Positive' },
        { name: 'CFO / PAT Ratio', val: cfoPat != null ? cfoPat.toFixed(2) : 'N/A', status: cfoPat != null ? (cfoPat > 1 ? 'pass' : cfoPat > 0.9 ? 'warn' : 'fail') : 'na', threshold: '> 0.9' },
        { name: 'Positive CFO Years', val: cfSeries.length > 0 ? cfSeries.filter(x => x > 0).length + '/' + cfSeries.length : 'N/A', status: cfSeries.length > 0 ? (cfSeries.every(x => x > 0) ? 'pass' : 'warn') : 'na', threshold: 'All years' },
        { name: 'Positive FCF Years', val: fcfSeries.length > 0 ? fcfPositiveYears + '/' + fcfSeries.length : 'N/A', status: fcfSeries.length > 0 ? (fcfPositiveYears >= 3 ? 'pass' : fcfPositiveYears >= 2 ? 'warn' : 'fail') : 'na', threshold: '≥ 4/5 years' },
      ]
    },
    { icon: '⚡', title: 'Phase 7 — Capital Efficiency', status: roce != null && roce > 18 ? 'pass' : roce != null && roce > 12 ? 'warn' : 'fail',
      metrics: [
        { name: 'ROCE', val: roce != null ? roce.toFixed(1) + '%' : 'N/A', status: roce != null ? (roce > 25 ? 'pass' : roce > 18 ? 'warn' : 'fail') : 'na', threshold: '> 18% mandatory' },
        { name: 'ROE', val: roe != null ? pct(roe) : 'N/A', status: roe != null ? (roe*100 > 20 ? 'pass' : roe*100 > 15 ? 'warn' : 'fail') : 'na', threshold: '> 15%' },
        { name: 'ROA', val: roa != null ? pct(roa) : 'N/A', status: roa != null ? (roa*100 > 10 ? 'pass' : roa*100 > 5 ? 'warn' : 'fail') : 'na', threshold: '' },
        { name: 'EV/EBITDA', val: evEbitda != null ? evEbitda.toFixed(1) + 'x' : 'N/A', status: evEbitda != null ? (evEbitda < 25 ? 'pass' : evEbitda < 40 ? 'warn' : 'fail') : 'na', threshold: '' },
      ]
    },
    { icon: '🔄', title: 'Phase 8 — Working Capital', status: currentRatio != null && currentRatio > 1.5 ? 'pass' : 'warn',
      metrics: [
        { name: 'Current Ratio', val: currentRatio != null ? currentRatio.toFixed(2) : 'N/A', status: currentRatio != null ? (currentRatio > 2 ? 'pass' : currentRatio > 1.5 ? 'warn' : 'fail') : 'na', threshold: '> 1.5' },
        { name: 'Asset Turnover', val: totalAssets && revenue ? (revenue / totalAssets).toFixed(2) + 'x' : 'N/A', status: totalAssets && revenue ? (revenue / totalAssets > 0.8 ? 'pass' : 'warn') : 'na', threshold: '' },
        { name: 'Earnings Growth (YoY)', val: earningsGrowth != null ? pct(earningsGrowth) : 'N/A', status: earningsGrowth != null ? (earningsGrowth > 0.15 ? 'pass' : earningsGrowth > 0 ? 'warn' : 'fail') : 'na', threshold: '' },
      ]
    },
    { icon: '🏛️', title: 'Phase 9 — Governance', status: promoterHolding != null && promoterHolding > 0.5 ? 'pass' : 'warn',
      metrics: [
        { name: 'Promoter / Insider Holding', val: promoterHolding != null ? pct(promoterHolding) : 'N/A', status: promoterHolding != null ? (promoterHolding > 0.5 ? 'pass' : promoterHolding > 0.35 ? 'warn' : 'fail') : 'na', threshold: '> 50%' },
        { name: 'Institutional Holding', val: institutionalHolding != null ? pct(institutionalHolding) : 'N/A', status: institutionalHolding != null ? (institutionalHolding > 0.25 ? 'pass' : institutionalHolding > 0.1 ? 'warn' : 'fail') : 'na', threshold: 'Increasing' },
        { name: 'Promoter Pledge', val: 'Check BSE/NSE', status: 'na', threshold: '0% preferred' },
        { name: 'Auditor Red Flags', val: 'Manual check needed', status: 'na', threshold: 'None' },
      ]
    },
    { icon: '💎', title: 'Phase 10 — Valuation', status: peg != null && peg < 1.5 ? 'pass' : pe != null && pe < 40 ? 'warn' : 'fail',
      metrics: [
        { name: 'PEG Ratio', val: peg != null ? peg.toFixed(2) : 'N/A', status: peg != null ? (peg < 1 ? 'pass' : peg < 1.5 ? 'warn' : 'fail') : 'na', threshold: '< 1.5' },
        { name: 'Trailing P/E', val: pe != null ? pe.toFixed(1) + 'x' : 'N/A', status: pe != null ? (pe < 30 ? 'pass' : pe < 50 ? 'warn' : 'fail') : 'na', threshold: 'Justified by growth' },
        { name: 'Forward P/E', val: forwardPE != null ? forwardPE.toFixed(1) + 'x' : 'N/A', status: forwardPE != null ? (forwardPE < 25 ? 'pass' : forwardPE < 40 ? 'warn' : 'fail') : 'na', threshold: '' },
        { name: 'EV / EBITDA', val: evEbitda != null ? evEbitda.toFixed(1) + 'x' : 'N/A', status: evEbitda != null ? (evEbitda < 20 ? 'pass' : evEbitda < 35 ? 'warn' : 'fail') : 'na', threshold: 'Below sector median' },
        { name: 'Price / Book', val: pb != null ? pb.toFixed(2) + 'x' : 'N/A', status: pb != null ? (pb < 5 ? 'pass' : pb < 10 ? 'warn' : 'fail') : 'na', threshold: '' },
        { name: 'EV / Revenue', val: evRev != null ? evRev.toFixed(2) + 'x' : 'N/A', status: 'na', threshold: '' },
      ]
    },
    { icon: '🎯', title: 'Phase 11 — Quality Score', status: totalScore >= 70 ? 'pass' : totalScore >= 60 ? 'warn' : 'fail',
      metrics: [
        { name: 'Growth Quality (25)', val: scoreBreakdown.growth + '/25', status: scoreBreakdown.growth >= 18 ? 'pass' : scoreBreakdown.growth >= 12 ? 'warn' : 'fail', threshold: '' },
        { name: 'Balance Sheet (20)', val: scoreBreakdown.balanceSheet + '/20', status: scoreBreakdown.balanceSheet >= 15 ? 'pass' : scoreBreakdown.balanceSheet >= 10 ? 'warn' : 'fail', threshold: '' },
        { name: 'Cash Flow Quality (20)', val: scoreBreakdown.cashFlow + '/20', status: scoreBreakdown.cashFlow >= 15 ? 'pass' : scoreBreakdown.cashFlow >= 10 ? 'warn' : 'fail', threshold: '' },
        { name: 'Capital Efficiency (20)', val: scoreBreakdown.capEfficiency + '/20', status: scoreBreakdown.capEfficiency >= 15 ? 'pass' : scoreBreakdown.capEfficiency >= 10 ? 'warn' : 'fail', threshold: '' },
        { name: 'Governance (10)', val: scoreBreakdown.governance + '/10', status: scoreBreakdown.governance >= 8 ? 'pass' : scoreBreakdown.governance >= 6 ? 'warn' : 'fail', threshold: '' },
        { name: 'Valuation (5)', val: scoreBreakdown.valuation + '/5', status: scoreBreakdown.valuation >= 4 ? 'pass' : scoreBreakdown.valuation >= 2 ? 'warn' : 'fail', threshold: '' },
      ]
    },
    { icon: '📡', title: 'Phase 12 — Smart Money', status: currentPrice && v(sd, 'twoHundredDayAverage') && currentPrice > v(sd, 'twoHundredDayAverage') ? 'pass' : 'warn',
      metrics: [
        { name: 'Price vs 200 DMA', val: currentPrice && v(sd, 'twoHundredDayAverage') ? (currentPrice > v(sd, 'twoHundredDayAverage') ? '✓ Above 200DMA' : '✗ Below 200DMA') : 'N/A', status: currentPrice && v(sd, 'twoHundredDayAverage') ? (currentPrice > v(sd, 'twoHundredDayAverage') ? 'pass' : 'fail') : 'na', threshold: 'Above 200DMA' },
        { name: 'Price vs 50 DMA', val: currentPrice && v(sd, 'fiftyDayAverage') ? (currentPrice > v(sd, 'fiftyDayAverage') ? '✓ Above 50DMA' : '✗ Below 50DMA') : 'N/A', status: currentPrice && v(sd, 'fiftyDayAverage') ? (currentPrice > v(sd, 'fiftyDayAverage') ? 'pass' : 'warn') : 'na', threshold: 'Above 50DMA' },
        { name: '52W High', val: v(sd, 'fiftyTwoWeekHigh') != null ? '₹' + v(sd, 'fiftyTwoWeekHigh').toFixed(2) : 'N/A', status: 'na', threshold: '' },
        { name: '52W Low', val: v(sd, 'fiftyTwoWeekLow') != null ? '₹' + v(sd, 'fiftyTwoWeekLow').toFixed(2) : 'N/A', status: 'na', threshold: '' },
        { name: 'Beta', val: v(sd, 'beta') != null ? v(sd, 'beta').toFixed(2) : 'N/A', status: v(sd, 'beta') != null ? (v(sd,'beta') < 1.2 ? 'pass' : v(sd,'beta') < 1.5 ? 'warn' : 'fail') : 'na', threshold: '' },
        { name: 'Institutional Holding', val: institutionalHolding != null ? pct(institutionalHolding) : 'Check NSE', status: institutionalHolding != null ? (institutionalHolding > 0.25 ? 'pass' : 'warn') : 'na', threshold: 'Increasing' },
      ]
    },
  ];

  return { symbol, companyName, sector, industry, exchange, currentPrice, priceChange, marketCap, marketCapCr, pe, forwardPE, peg, pb, eps, roe, roa, roce, deRatio, currentRatio, totalDebt, totalCash, netDebt, ocf, fcf, cfoPat, rev3yCagr, rev5yCagr, pat3yCagr, pat5yCagr, qRevGrowth, qPatGrowth, profitMargin, ebitdaMargin, opMargin, promoterHolding, institutionalHolding, totalScore, scoreBreakdown, verdict, verdictDesc, category, categoryClass, strengths, risks, phases, isNetCash, icr, evEbitda };
}

function scoreClass(s) { return s >= 85 ? 'score-elite' : s >= 70 ? 'score-high' : s >= 60 ? 'score-watch' : 'score-reject'; }
function statusClass(s) { return { pass: 'status-pass', warn: 'status-warn', fail: 'status-fail', na: 'status-na' }[s] || 'status-na'; }
function msClass(s) { return { pass: 'ms-pass', warn: 'ms-warn', fail: 'ms-fail', na: 'ms-na' }[s] || 'ms-na'; }
function statusLabel(s) { return { pass: '✓ Pass', warn: '~ Warn', fail: '✗ Fail', na: '— N/A' }[s] || '—'; }

function renderResults(a) {
  const el = document.getElementById('results');
  const priceChangeHtml = a.priceChange != null ? '<div class="price-change ' + (a.priceChange >= 0 ? 'up' : 'down') + '">' + (a.priceChange >= 0 ? '▲' : '▼') + ' ' + Math.abs(a.priceChange).toFixed(2) + '% today</div>' : '';

  const phasesHtml = a.phases.map((p, i) => `
    <div class="phase-card" id="phase${i}">
      <div class="phase-header" onclick="togglePhase('phase${i}')">
        <span class="phase-icon">${p.icon}</span>
        <span class="phase-title">${p.title}</span>
        <span class="phase-status ${statusClass(p.status)}">${statusLabel(p.status)}</span>
        <span class="phase-chevron">▼</span>
      </div>
      <div class="phase-body">
        ${p.metrics.map(m => '<div class="metric-row"><span class="metric-name">' + m.name + (m.threshold ? ' <em style="opacity:.45;font-size:10px">· ' + m.threshold + '</em>' : '') + '</span><span class="metric-val">' + m.val + '</span><span class="metric-status ' + msClass(m.status) + '">' + (m.status === 'pass' ? '✓' : m.status === 'fail' ? '✗' : m.status === 'warn' ? '~' : '—') + '</span></div>').join('')}
      </div>
    </div>`).join('');

  const outItems = [
    { l: 'Company', v: a.companyName, c: '' },
    { l: 'Sector', v: a.sector, c: '' },
    { l: 'Market Cap', v: mcapCr(a.marketCap), c: '' },
    { l: 'Revenue 3Y CAGR', v: a.rev3yCagr != null ? a.rev3yCagr.toFixed(1) + '%' : 'N/A', c: a.rev3yCagr != null && a.rev3yCagr > 15 ? 'green' : a.rev3yCagr != null && a.rev3yCagr < 10 ? 'red' : '' },
    { l: 'PAT 3Y CAGR', v: a.pat3yCagr != null ? a.pat3yCagr.toFixed(1) + '%' : 'N/A', c: a.pat3yCagr != null && a.pat3yCagr > 20 ? 'green' : a.pat3yCagr != null && a.pat3yCagr < 10 ? 'red' : '' },
    { l: 'ROCE', v: a.roce != null ? a.roce.toFixed(1) + '%' : 'N/A', c: a.roce != null && a.roce > 20 ? 'green' : a.roce != null && a.roce < 12 ? 'red' : '' },
    { l: 'ROE', v: a.roe != null ? pct(a.roe) : 'N/A', c: a.roe != null && a.roe > 0.15 ? 'green' : a.roe != null && a.roe < 0.10 ? 'red' : '' },
    { l: 'Debt / Equity', v: a.deRatio != null ? a.deRatio.toFixed(2) + 'x' : 'N/A', c: a.deRatio != null && a.deRatio < 0.3 ? 'green' : a.deRatio != null && a.deRatio > 0.8 ? 'red' : '' },
    { l: 'CFO / PAT Ratio', v: a.cfoPat != null ? a.cfoPat.toFixed(2) : 'N/A', c: a.cfoPat != null && a.cfoPat > 0.9 ? 'green' : a.cfoPat != null && a.cfoPat < 0.5 ? 'red' : '' },
    { l: 'Free Cash Flow', v: a.fcf != null ? (a.fcf > 0 ? '✓ Positive ' + fmt(a.fcf) : '✗ Negative ' + fmt(a.fcf)) : 'N/A', c: a.fcf != null && a.fcf > 0 ? 'green' : a.fcf != null ? 'red' : '' },
    { l: 'Net Debt Status', v: a.netDebt != null ? (a.netDebt < 0 ? '✓ Net Cash' : fmt(a.netDebt)) : 'N/A', c: a.isNetCash ? 'green' : '' },
    { l: 'PAT Margin', v: a.profitMargin != null ? pct(a.profitMargin) : 'N/A', c: a.profitMargin != null && a.profitMargin > 0.15 ? 'green' : a.profitMargin != null && a.profitMargin < 0.10 ? 'red' : '' },
    { l: 'Promoter Holding', v: a.promoterHolding != null ? pct(a.promoterHolding) : 'Check NSE/BSE', c: a.promoterHolding != null && a.promoterHolding > 0.5 ? 'green' : '' },
    { l: 'Institutional Holding', v: a.institutionalHolding != null ? pct(a.institutionalHolding) : 'N/A', c: a.institutionalHolding != null && a.institutionalHolding > 0.25 ? 'green' : '' },
    { l: 'PEG Ratio', v: a.peg != null ? a.peg.toFixed(2) : 'N/A', c: a.peg != null && a.peg < 1.5 ? 'green' : a.peg != null && a.peg > 2.5 ? 'red' : '' },
    { l: 'Trailing P/E', v: a.pe != null ? a.pe.toFixed(1) + 'x' : 'N/A', c: '' },
    { l: 'Interest Coverage', v: a.icr != null ? a.icr.toFixed(1) + 'x' : 'N/A', c: a.icr != null && a.icr > 10 ? 'green' : a.icr != null && a.icr < 6 ? 'red' : '' },
    { l: 'Stock Type', v: a.category, c: 'blue' },
    { l: 'Quality Score', v: a.totalScore + ' / 100', c: a.totalScore >= 85 ? 'green' : a.totalScore >= 70 ? 'blue' : a.totalScore >= 60 ? 'yellow' : 'red' },
    { l: 'Verdict', v: a.verdict, c: a.totalScore >= 70 ? 'green' : a.totalScore >= 60 ? 'yellow' : 'red' },
  ];

  const sbEntries = Object.entries(a.scoreBreakdown);
  const labels = { growth: 'Growth', balanceSheet: 'Balance Sheet', cashFlow: 'Cash Flow', capEfficiency: 'Cap. Efficiency', governance: 'Governance', valuation: 'Valuation' };
  const maxes = { growth: 25, balanceSheet: 20, cashFlow: 20, capEfficiency: 20, governance: 10, valuation: 5 };
  const sbHtml = sbEntries.map(([k, val]) => {
    const pf = (val / maxes[k] * 100);
    return '<div style="background:#080c18;border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:#475569;margin-bottom:4px">' + labels[k] + '</div><div style="font-size:13px;font-weight:700;color:#e2e8f0">' + val + '<span style="color:#475569;font-weight:400">/' + maxes[k] + '</span></div><div style="height:3px;background:#1e293b;border-radius:2px;margin-top:4px"><div style="height:3px;width:' + pf + '%;background:' + (pf > 70 ? '#34d399' : pf > 40 ? '#fbbf24' : '#f87171') + ';border-radius:2px"></div></div></div>';
  }).join('');

  el.innerHTML =
    '<div class="stock-header">' +
      '<div><div class="stock-name">' + a.companyName + '</div><div class="stock-sub">' + a.symbol + ' · ' + a.exchange + ' · ' + a.sector + '</div></div>' +
      '<div class="stock-price"><div class="price-val">' + (a.currentPrice != null ? '₹' + a.currentPrice.toFixed(2) : 'N/A') + '</div>' + priceChangeHtml + '</div>' +
      '<div class="stock-meta">' +
        '<div class="meta-item"><span class="meta-label">Market Cap</span><span class="meta-val">' + mcapCr(a.marketCap) + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">P/E</span><span class="meta-val">' + (a.pe != null ? a.pe.toFixed(1) + 'x' : 'N/A') + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">EPS (TTM)</span><span class="meta-val">' + (a.eps != null ? '₹' + a.eps.toFixed(2) : 'N/A') + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">EBITDA Margin</span><span class="meta-val">' + (a.ebitdaMargin != null ? pct(a.ebitdaMargin) : 'N/A') + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">ROE</span><span class="meta-val">' + (a.roe != null ? pct(a.roe) : 'N/A') + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">D/E</span><span class="meta-val">' + (a.deRatio != null ? a.deRatio.toFixed(2) + 'x' : 'N/A') + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div class="score-section">' +
      '<div class="score-card ' + scoreClass(a.totalScore) + '"><div class="score-num">' + a.totalScore + '</div><div class="score-label">Quality Score / 100</div><div style="font-size:12px;margin-top:8px;color:#64748b">' + (a.totalScore >= 85 ? '★ Elite Compounder' : a.totalScore >= 70 ? '♦ High Quality' : a.totalScore >= 60 ? '◆ Watchlist' : '✗ Reject') + '</div></div>' +
      '<div class="category-card"><div class="category-badge ' + a.categoryClass + '">' + a.category + '</div><div class="verdict">' + a.verdict + '</div><div class="verdict-desc">' + a.verdictDesc + '</div><div style="margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">' + sbHtml + '</div></div>' +
    '</div>' +
    '<div class="phases-grid">' + phasesHtml + '</div>' +
    '<div class="strengths-risks">' +
      '<div class="sr-card strengths"><h3>Key Strengths</h3><ul class="sr-list">' + a.strengths.map(s => '<li>' + s + '</li>').join('') + '</ul></div>' +
      '<div class="sr-card risks"><h3>Key Risks</h3><ul class="sr-list">' + a.risks.map(r => '<li>' + r + '</li>').join('') + '</ul></div>' +
    '</div>' +
    '<div class="output-section"><h2>Full Analysis Output</h2><div class="output-grid">' +
      outItems.map(o => '<div class="out-item"><div class="out-label">' + o.l + '</div><div class="out-val ' + o.c + '">' + o.v + '</div></div>').join('') +
    '</div></div>' +
    '<div class="disclaimer">Data sourced from Yahoo Finance. For educational purposes only. Not investment advice.<br>Always verify promoter pledge, SEBI actions, and auditor notes from official NSE/BSE disclosures before investing.</div>';

  document.getElementById('results').style.display = 'block';
  document.getElementById('phase0').classList.add('open');
  document.getElementById('phase10').classList.add('open');
}

function togglePhase(id) { document.getElementById(id).classList.toggle('open'); }
</script>

</html>
